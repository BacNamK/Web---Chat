<div class="w-full h-full p-4 custom-scrollbar overflow-y-auto">
    <div class="w-full h-auto">
        <span id="box-admin" class="block text-[18px] text-black/70">Admin</span>
        <div id="admin"></div>
    </div>
    <div class="w-full h-auto">
        <span id="box-moderator" class="block text-[18px] text-black/70">Moderator</span>
        <div id="moderator"></div>
    </div>
    <div class="w-full h-auto">
        <span id="box-user" class="block text-[18px] text-black/70">User</span>
        <div id="user"></div>
    </div>
</div>

<script>
    let users = [];
const socket_status = new WebSocket("ws://127.0.0.1:8000/ws/chat/community/");

function getInitials(name) {
    return name ? name.slice(0, 2).toUpperCase() : "??";
}

const adminDiv = document.getElementById("admin");
const boxAdmin = document.getElementById("box-admin");

const moderatorDiv = document.getElementById("moderator"); 
const boxModerator = document.getElementById("box-moderator");

const userDiv = document.getElementById("user");
const boxUser = document.getElementById("box-user");

function appendUserRow( user) {
    // user_leave dùng user_id, nên cần lưu user_id vào DOM
    const userId = user.user_id ?? user.id;
    const key = userId ?? `uname-${user.username}`;
    const div = document.createElement("div");
    div.id = `user-${key}`;
    div.dataset.username = user.username;
    if (userId) div.dataset.userId = userId;
    div.className = "flex items-center gap-3 px-3 py-2 rounded-lg mb-1 bg-white";
    div.style.animation = "slideIn 0.3s ease";

     const avatarUrl = user.avatar ? `/media/${user.avatar}` : null;
    const avatarHtml = user.avatar
        ? `<div class ="relative">
            <img src="${avatarUrl}" class="w-9 h-9 rounded-full object-cover flex-shrink-0" />
            <div class="absolute bottom-0 right-0 w-3 h-3 rounded-full bg-green-500 border-2 border-white"></div>
            </div>`
        : `<div class="w-8 h-8 rounded-full bg-amber-400 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${getInitials(user.username)}</div>`;

    div.innerHTML = `
        ${avatarHtml}
        <div>
            <div class="text-md font-bold ${user.is_superuser ? 'text-green-500' : user.is_staff ? 'text-green-600' : 'text-black'}">
                ${user.username}
            </div>
        </div>
    `;
    if (user.is_superuser) {
        adminDiv.appendChild(div);
    } else if (user.is_staff) {
        moderatorDiv.appendChild(div);
    } else {
        userDiv.appendChild(div);
    }

    if (adminDiv.length === 0) {
    boxAdmin.classList.add("hidden");
    }else {
    boxAdmin.classList.remove("hidden");
    }

    if (moderatorDiv.children.length === 0) {
    boxModerator.classList.add("hidden");
    }else {
    boxModerator.classList.remove("hidden");            
    }
    
    if (userDiv.children.length === 0) { 
    boxUser.classList.add("hidden");
    }else { 
    boxUser.classList.remove("hidden");            
    }       
}

function removeUserRow(identifier) {
    // Thử xóa theo id trước, nếu không có thì theo username, nếu id chỉ có người dùng ở users list thì dò thêm
    let el = document.getElementById(`user-${identifier}`)
           ?? document.querySelector(`[data-username="${identifier}"]`);
    if (!el) {
        const fromList = users.find(u => String(u.user_id ?? u.id) === String(identifier));
        if (fromList) {
            el = document.getElementById(`user-${fromList.user_id ?? fromList.id}`)
               ?? document.querySelector(`[data-username="${fromList.username}"]`);
        }
    }
    if (el) {
        el.style.transition = "opacity 0.3s, transform 0.3s";
        el.style.opacity = "0";
        el.style.transform = "translateX(10px)";
        setTimeout(() => el.remove(), 300);
    }
}

function updateRealtimeUI(changedType, changedUser = null) {

    if (changedType === "init_users" || changedType === "update_users") {
        admin.innerHTML = "";
        moderator.innerHTML = "";
        user.innerHTML = "";

        users.forEach(user => appendUserRow( user));

    } else if (changedType === "user_join" && changedUser) {
        appendUserRow(changedUser);

    } else if (changedType === "user_leave" && changedUser) {
        removeUserRow(changedUser.user_id);
    }

    const counter = document.getElementById("online-count");
    if (counter) counter.textContent = users.length;

}

socket_status.onmessage = (e) => {
    const data = JSON.parse(e.data);

    console.log(data)
    if (data.type === "init_users" || data.type === "update_users") {
        users = [...data.users];
        updateRealtimeUI(data.type);

    } else if (data.type === "user_join") {          
        if (!users.some(u => u.username === data.username)) {
            const newUser = {user_id: data.user_id, username: data.username, avatar: data.avatar };
            users.push(newUser);
            updateRealtimeUI("user_join", newUser);
        }

    } else if (data.type === "user_leave") {
        users = users.filter(u => String(u.user_id) !== String(data.user_id));
        updateRealtimeUI("user_leave", { user_id: data.user_id });
    }
};
</script>
