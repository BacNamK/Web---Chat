{% load static %}
<div class="w-full h-full justify-items-center pt-5 overflow-y-auto">
  <form
    action="{% url 'blog:post_blog' %}"
    method="post"
    enctype="multipart/form-data"
    class="w-[90%] h-full"
  >
    {% csrf_token %}

    <div class="flex">
      <input
        class="text-3xl h-15 w-full focus:bg-gray-200 outline-none border-b pl-4"
        type="text"
        name="title"
        placeholder="Tiêu Đề"
        maxlength="100"
        required
      />
      <div class="p-2">
        <button type="submit" class="bg-green-300 w-20 h-full rounded-[5px]">
          Đăng
        </button>
      </div>
    </div>

    <!-- Upload -->
    <div class="mt-2 flex gap-4 items-center">
      <label class="cursor-pointer w-8 h-8 flex justify-center items-center rounded-[5px] bg-gray-100 p-1">
        <img class="size-4" src="{% static 'image/image.png' %}" alt="">
        <input type="file" name="image" class="input-image hidden" accept="image/*">
      </label>
      <label class="cursor-pointer w-8 h-8 flex justify-center items-center rounded-[5px] bg-gray-100 p-1">
        <img class="size-5" src="{% static 'image/video-camera.png' %}" alt="">
        <input type="file" name="video" class="input-video hidden" accept="video/*">
      </label>
      <button type="button" class="btn-cancel text-sm px-3 h-8 rounded-[5px] bg-gray-200 hover:bg-gray-300">
        Hủy
      </button>
    </div>

    <!-- Preview -->
    <div class="relative w-full h-[55%] mt-1 flex justify-center items-center bg-gray-100 rounded-[5px] overflow-hidden">
      
      <!-- Blur background -->
      <div class="absolute inset-0 bg-center bg-cover blur-2xl scale-110 shell hidden"></div>

      <!-- Image preview -->
      <img class="relative z-10 max-h-full preview-image hidden" src="" alt="">

      <!-- Video preview -->
      <video class="relative z-10 max-h-full preview-video hidden" controls></video>

      <span class="text opacity-50 no-image">Không có ảnh</span>
    </div>

    <div class="pt-5">
      <textarea
        class="w-full p-2 h-40 bg-gray-100 rounded-[5px] outline-none"
        maxlength="5000"
        name="content"
        placeholder="Nội Dung"
        required
      ></textarea>
    </div>

  </form>
</div>

<script>
  const inputImage = document.querySelector('.input-image');
  const inputVideo = document.querySelector('.input-video');
  const previewImage = document.querySelector('.preview-image');
  const previewVideo = document.querySelector('.preview-video');
  const shell = document.querySelector('.shell');
  const text = document.querySelector('.no-image');
  const btnCancel = document.querySelector('.btn-cancel');
  let currentUrl = null;

  const clearPreview = () => {
    if (currentUrl) {
      URL.revokeObjectURL(currentUrl);
      currentUrl = null;
    }
    previewImage.src = '';
    previewVideo.src = '';
    previewImage.classList.add('hidden');
    previewVideo.classList.add('hidden');
    shell.classList.add('hidden');
    text.classList.remove('hidden');
  };

  const showImage = (file) => {
    clearPreview();
    currentUrl = URL.createObjectURL(file);
    previewImage.src = currentUrl;
    shell.style.backgroundImage = `url(${currentUrl})`;
    previewImage.classList.remove('hidden');
    shell.classList.remove('hidden');
    text.classList.add('hidden');
  };

  const showVideo = (file) => {
    clearPreview();
    currentUrl = URL.createObjectURL(file);
    previewVideo.src = currentUrl;
    shell.classList.add('hidden');
    previewVideo.classList.remove('hidden');
    text.classList.add('hidden');
  };

  inputImage.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      inputVideo.value = '';
      showImage(file);
    }
  });

  inputVideo.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      inputImage.value = '';
      showVideo(file);
    }
  });

  btnCancel.addEventListener('click', () => {
    inputImage.value = '';
    inputVideo.value = '';
    clearPreview();
  });

  document.querySelector('form').addEventListener("submit", () => {
    clearPreview();
  });
</script>
